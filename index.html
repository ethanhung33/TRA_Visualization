<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵運行圖</title>
    <style>
        body, html { margin: 0; padding: 0; background: #e0e0e0; height: 100%; overflow: hidden; }
        
        /* 🌟 浮動控制面板 */
        #control-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100; /* 確保在畫布最上層 */
            font-family: sans-serif;
        }

        #canvas-wrapper {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            background: #fff;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="control-panel">
        <label for="routeSelect"><b>視角切換：</b></label>
        <select id="routeSelect">
            <option value="mountain">縱貫線 (經 山線)</option>
            <option value="sea">縱貫線 (經 海線)</option>
        </select>
    </div>

    <div id="canvas-wrapper">
        <canvas id="diaCanvas"></canvas>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
