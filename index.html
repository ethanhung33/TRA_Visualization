<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <title>Taiwan Railway Operation Diagram</title>
        <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
        <style>
            body { margin: 0; padding: 0; display: flex; background-color: #111; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
            #main-wrapper { display: flex; flex-direction: column; width: 75vw; height: 100vh; }
            #container { width: 100%; height: 90vh; position: relative; }
            #bottompanel {
                width: 100%; height: 10vh; background-color: #111; color: white; 
                padding: 0 15px; box-sizing: border-box; border-top: 1px solid #444;
                display: flex; flex-direction: row; align-items: center; 
                justify-content: flex-start; gap: 20px; overflow: hidden;
            }
            #sidebar { 
                width: 25vw; height: 100vh; background-color: #222; color: white; 
                padding: 20px; box-sizing: border-box; border-left: 1px solid #444;
            }
            .placeholder { color: #666; font-style: italic; }
            #sidebar h2 { border-bottom: 1px solid #444; padding-bottom: 8px; }

            #pill-container, #line-pill-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
            .pill { 
                border: 1px solid #444; padding: 8px 16px; border-radius: 20px; 
                cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; 
                background-color: #333; color: #888; 
            }
            .pill:hover { transform: translateY(-1px); filter: brightness(1.2); }
            .pill.active { color: black; border-color: transparent; }
            .pill.utility:hover { background-color: #666; color: white; }
            .line-pill.active { background-color: #0078d4; color: white; }

            #info-content { display: flex; flex-direction: row; align-items: center; gap: 10px; flex-grow: 1; overflow: hidden; }
            #info-content div , #info-content p { 
                margin: 0; display: flex; flex-direction: row; align-items: center; white-space: nowrap;
                padding: 0 15px; border-right: 1px solid #333; height: 1.2em; 
            }
            #info-content p:last-child { border-right: none; }

            .day-container {
                display: flex; align-items: center; justify-content: center;
                gap: 3px; display: flex; flex-shrink: 0;
            }
            .day-box { 
                width: 14px; height: 14px; display: flex; flex-direction: row; align-items: center; 
                justify-content: center; font-size: 12px; border-radius: 4px; flex-shrink: 0;
                font-weight: bold; background-color: #444; color: #888; 
            }
            .day-box.active { background-color: #eee; color: #000; }
            .day-box.special-rule { position: relative; overflow: hidden; }
            .day-box.special-rule::after { 
                content: ""; position: absolute; top: 0; left: 0; width: 100%; 
                height: 1px; background: currentColor; transform: rotate(-45deg); 
                transform-origin: top left; 
            }
            #btn-clear-selection { 
                background: none; border: none; color: #888; 
                cursor: pointer; font-size: 28px; line-height: 1; padding: 0;
            }

            #view-monitor { 
                display: none; position: absolute; bottom: 20px; left: 20px; 
                background: rgba(0, 0, 0, 0.8); color: #00ff00; padding: 8px 12px; 
                border-radius: 4px; font-family: monospace; font-size: 12px; 
                pointer-events: none; z-index: 10; border: 1px solid #444; 
            }
            #view-monitor span { color: white; }
        </style>
    </head>
    <body>
        <div id="main-wrapper">
            <div id="container">
                <div id="view-monitor">

            </div>
        </div>

                                if (x % 240 === 0) gridData.normalLabelData.push(entry);
                                gridData.denseLabelData.push(entry);
                            }
                        }
                    });

                    const distances = Array.from(state.stationList).map(name => state.stationDistances[name]);
                    gridData.minDistance = Math.min(...distances);
                    gridData.maxDistance = Math.max(...distances);
                    
                    // Map Lines

                        const path = [[x * 3, gridData.minDistance - state.period], [x * 3, gridData.maxDistance + state.period]];

                        new deck.TextLayer({
                            id: `station-labels-${offset}`,
                            data: state.currentZoom > 0.8 ? gridData.denseLabelData : state.currentZoom > -0.4 ? gridData.normalLabelData : state.currentZoom > -1.8 ? gridData.sparseLabelData : [],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => [d.position[0], d.position[1] + offset],
                            getText: d => d.text,
                            getSize: 12, sizeMaxPixels: 12, sizeMinPixels: 0,
                            getColor: [180, 180, 180],
                            characterSet: 'auto',
                            fontFamily: 'Microsoft YaHei, SimHei, Arial, sans-serif',
                            getAlignmentBaseline: 'bottom', getTextAnchor: 'middle', pixelOffset: [0, -10]
                        })
                    ]);

                    const mainPlotLayers = yOffsets.flatMap(offset => [
                        new deck.PathLayer({
                            id: `main-path-layer-${offset}`,
                            data: processedSegments,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            pickable: true, autoHighlight: true, highlightColor: [255, 255, 255, 150],
                            getPath: d => d.data.map(p => [p.y * 3, p.adjustedDist + offset]),
                            getColor: d => colorPalette[d.train],
                            getWidth: 1.5, widthMaxPixels: 2, widthMinPixels: 0
                        })
                    ]);

                    const selectionLayers = yOffsets.flatMap(offset => [
                        new deck.PathLayer({
                            id: `selection-layer-${offset}`,
                            data: state.selectedLine && state.enabledTypes.has(state.selectedLine.train) ? processedSegments.filter(s => s.number === state.selectedLine.number) : [],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            pickable: false,
                            getPath: d => d.data.map(p => [p.y * 3, p.adjustedDist + offset]),
                            getColor: [255, 196, 0],
                            getWidth: 4, widthMaxPixels: 4.5, widthMinPixels: 0
                        }),
                        new deck.TextLayer({
                            id: `train-schedule-labels-${offset}`,
                            data: scheduleData,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => [(d.dep+1.5) * 3, d.yCoord + offset, 0],
                            getText: d => {
                                const format = (val) => `${Math.floor(val/60).toString().padStart(2,'0')}${(val%60).toString().padStart(2,'0')}`;
                                return `${format(d.arr)} - ${format(d.dep)} ${d.station}`;
                            },
                            getSize: 13, getColor: [255, 255, 255], characterSet: 'auto',
                            getTextAnchor: 'start', getAlignmentBaseline: 'center', pixelOffset: [15, 0], 
                            background: true, getBackgroundColor: [0, 0, 0, 180]
                        })
                    ]);

                    const baseLayers = [
                        new deck.PathLayer({
                            id: 'thin-time-lines', data: gridData.thinLines, coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path, getColor: [50, 50, 50], getWidth: 0.7, widthMaxPixels: 1.6, widthMinPixels: 0
                        }),
                        new deck.PathLayer({
                            id: 'thick-time-lines', data: gridData.thickLines, coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path, getColor: [80, 80, 80], getWidth: 1, widthMaxPixels: 2, widthMinPixels: 0
                        }),
                        new deck.TextLayer({
                            id: 'vertical-labels',
                            data: state.currentZoom > 0.8 ? gridData.denseLabels : state.currentZoom > -0.4 ? gridData.normalLabels : state.currentZoom > -1.6 ? gridData.sparseLabels : state.currentZoom > -2 ? gridData.simpleLabels : [],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => d.position, getText: d => d.text,
                            getSize: 12, sizeMaxPixels: 12, sizeMinPixels: 0,
                            getColor: [180, 180, 180], characterSet: 'auto',
                            getAlignmentBaseline: 'top', getTextAnchor: 'start', pixelOffset: [5, 5]
                        }),
                        new deck.ScatterplotLayer({
                            id: 'json-layer',
                            data: rawData.flatMap(g => g.data.map(p => ({...p, train: g.train}))),
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => [d.y*3, state.stationDistances[d.x]], 
                            getFillColor: [200, 200, 200], getRadius: 0.0001, radiusMaxPixels: 0.001, radiusMinPixels: 0.00001
                        })
                    ];

                    const currentTimeLayers = [
                        new deck.PathLayer({
                            id: 'current-time-line',
                            data: [{ path: [[state.currentTimeMinutes * 3, gridData.minDistance - state.period], [state.currentTimeMinutes * 3, gridData.maxDistance + state.period]] }],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path, getColor: [255, 0, 0, 150], getWidth: 2, widthMaxPixels: 3.5, widthMinPixels: 0
                        })
                    ];

                    deckInstance.setProps({ layers: [...baseLayers, ...offsetLayers, ...mainPlotLayers, ...selectionLayers, ...currentTimeLayers] });
                }

                syncPillStyles();
                updateStationGridData();
                renderLayers();
            }
            
            initMap();
        </script>
    </body>
</html>
