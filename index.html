<!DOCTYPE html>
<html lang="zh-TW">
    <head>
    <meta charset="UTF-8">
        <title>Taiwan Railway Operation Diagram</title>
        <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
        <style>
            body { margin: 0; padding: 0; display: flex; flex-wrap: wrap; background-color: #111; font-family: sans-serif; height: 100vh; overflow: hidden; }

            #container { width: 75vw; height: 90vh; position: relative; }
            #sidebar { width: 25vw; height: 100vh; background-color: #222; color: white; padding: 20px; box-sizing: border-box; border-left: 1px solid #444; }
            #bottom-panel { width: 100vw; height: 10vh; background-color: #222; color: white; padding: 10px 20px; box-sizing: border-box; border-top: 1px solid #444; display: flex; align-items: center; position: relative; }

            .placeholder { color: #666; font-style: italic; margin: 0; }
            h2 { border-bottom: 1px solid #444; padding-bottom: 8px; }
            .date-input { background: #333; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; width: 100%; margin-bottom: 15px; }

            #view-monitor { display: none; position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); color: #00ff00; padding: 8px 12px; border-radius: 4px; font-family: monospace; font-size: 12px; pointer-events: none; z-index: 10; border: 1px solid #444; }

            #pill-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
            .pill { border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; background-color: #333; color: #888; border: 1px solid #444; }
            .pill.active { color: black; }

            #info-content { display: flex; gap: 20px; align-items: center; width: 100%; }
            #info-content p { margin: 0; font-size: 14px; }
            #btn-clear-selection { background: none; border: none; color: #888; cursor: pointer; font-size: 24px; position: absolute; right: 20px; top: 10px; }
            
            .day-container { display: flex; gap: 3px; }
            .day-box { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 2px; background-color: #444; color: #888; }
            .day-box.active { background-color: #eee; color: #000; }
        </style>
    </head>
    <body>
        <div id="container">
            <div id="view-monitor">
                Zoom: <span id="val-zoom">0</span> | 
                Center: [<span id="val-x">0</span>, <span id="val-y">0</span>]
            </div>
        </div>
        <div id="sidebar">
            <h2>日期</h2>
            <input type="date" id="date-selector" class="date-input">
            <h2>路線</h2>
            <div id="line-pill-container">
                <button class="pill line-pill active" data-line="mountain">山線</button>
                <button class="pill line-pill" data-line="sea">海線</button>
            </div>
            <h2>車種</h2>
            <div id="pill-container">
                <button id="btn-select-all" class="pill utility">全選</button>
                <button id="btn-deselect-all" class="pill utility">全部不選</button>
                <button class="pill active" data-type="普悠瑪" checked> 普悠瑪</button>
                <button class="pill active" data-type="太魯閣" checked> 太魯閣</button>
                <button class="pill active" data-type="新自強" checked> 新自強</button>
                <button class="pill active" data-type="自強" checked> 自強</button>
                <button class="pill active" data-type="莒光" checked> 莒光</button>
                <button class="pill active" data-type="區間快" checked> 區間快</button>
                <button class="pill active" data-type="區間" checked> 區間</button>
            </div>
        </div>

        <div id="bottom-panel">
            <button id="btn-clear-selection" style="display: none;">&times;</button>
            <div id="info-content">
                <p class="placeholder">點選列車以顯示資訊</p>
            </div>
        </div>

                            valZoom.innerText = clampedZoom.toFixed(2);
                            valX.innerText = Math.round(viewState.target[0]);
                            valY.innerText = Math.round(viewState.target[1]);
                        }

                        const nextViewState = { ...viewState, zoom: clampedZoom };
                        currentViewState = nextViewState;
                        currentZoom = clampedZoom;
                        
                        deckInstance.setProps({ viewState: nextViewState });
                        renderLayers(); // Re-render for dynamic label LOD
                    },

                    onClick: (info) => {
                        if (info.object && info.layer.id.includes('main-path-layer')) {
                            selectedLine = rawData.find(t => t.number === info.object.number);
                            showSchedule = true;
                        } else {
                            resetSelection();
                        }
                        updateInfoBox();
                        renderLayers();
                    }
                });

                // --- Grid and Label Pre-processing ---
                let denseLabelData = [], normalLabelData = [], sparseLabelData = [];
                let thickLines = [], thinLines = [];
                let simpleLabels = [], sparseLabels = [], normalLabels = [], denseLabels = [];

                function updateStationGridData() {
                    const tempDenseLabels = [], tempNormalLabels = [], tempSparseLabels = [];
                    const tempThickLines = [], tempThinLines = [];
                    const vSparse = [], vNormal = [], vDense = [], vSimple = [];

                    // Horizontal Station Guides
                    Object.entries(stationDistances).forEach(([name, yValue]) => {
                        if (stationList.has(name)) {
                            for (let x = 240; x <= 1680; x += 120) {
                                const entry = { text: name, position: [x * 3, yValue], y: yValue };
                                if (x % 480 === 0) tempSparseLabels.push(entry);
                                if (x % 240 === 0) tempNormalLabels.push(entry);
                                tempDenseLabels.push(entry);
                            }
                        }
                    });

                    // Vertical Time Lines
                    const distances = Array.from(stationList).map(name => stationDistances[name]);
                    const minDist = Math.min(...distances);
                    const maxDist = Math.max(...distances);

                    for (let x = 240; x <= 1680; x += 10) {
                        const path = [[x * 3, minDist - PERIOD], [x * 3, maxDist + PERIOD]];
                        if (x % 60 === 0) tempThickLines.push({ path });
                        else tempThinLines.push({ path });
                    }

                    // Vertical Time Labels (HHMM format)
                    const generateTimeLabel = (x, y) => ({
                        text: `${Math.floor(x / 60).toString().padStart(2, '0')}${(x % 60).toString().padStart(2, '0')}`,
                        position: [(x * 3) + 5, y]
                    });

                    for (let y = minDist - PERIOD; y <= maxDist + PERIOD; y += 800) {
                        for (let x = 240; x <= 1680; x += 60) {
                            const lbl = generateTimeLabel(x, y);
                            vSparse.push(lbl);
                            if (x % 120 === 0) vSimple.push(lbl);
                        }
                    }
                    for (let y = minDist - PERIOD; y <= maxDist + PERIOD; y += 400) {
                        for (let x = 240; x <= 1680; x += 10) {
                            const lbl = generateTimeLabel(x, y);
                            vDense.push(lbl);
                            if (x % 30 === 0) vNormal.push(lbl);
                        }
                    }

                    denseLabelData = tempDenseLabels;
                    normalLabelData = tempNormalLabels;
                    sparseLabelData = tempSparseLabels;
                    thickLines = tempThickLines;
                    thinLines = tempThinLines;
                    sparseLabels = vSparse;
                    simpleLabels = vSimple;
                    normalLabels = vNormal;
                    denseLabels = vDense;
                }

                // --- Core Rendering Function ---
                function renderLayers() {
                    const yOffsets = [-PERIOD, 0, PERIOD];
                    const distances = Array.from(stationList).map(name => stationDistances[name]);
                    const minDist = Math.min(...distances);
                    const maxDist = Math.max(...distances);

                    // 1. Process Train Path Data (Continuous logic)
                    const processedSegments = rawData
                        .filter(train => enabledTypes.has(train.train))
                        .map(train => {
                            const validPoints = train.data.filter(p => stationDistances[p.x] !== undefined);
                            let cumulativeOffset = 0;
                            const adjustedData = [];

                            for (let i = 0; i < validPoints.length; i++) {
                                const currentPoint = validPoints[i];
                                const currentRawDist = stationDistances[currentPoint.x];

                                if (i > 0) {
                                    const prevRawDist = stationDistances[validPoints[i - 1].x];
                                    // Cross-over logic for wraparound
                                    if (prevRawDist < 1000 && currentRawDist > 6000) cumulativeOffset -= PERIOD;
                                    else if (prevRawDist > 6000 && currentRawDist < 1000) cumulativeOffset += PERIOD;
                                }
                                adjustedData.push({ ...currentPoint, adjustedDist: currentRawDist + cumulativeOffset });
                            }
                            return { ...train, data: adjustedData };
                        })
                        .filter(train => train.data.length > 1);

                    // 2. Prepare Selection Schedule
                    let scheduleData = [];
                    if (showSchedule && selectedLine) {
                        const grouped = {};
                        selectedLine.data.forEach(p => {
                            if (stationDistances[p.x] !== undefined) {
                                if (!grouped[p.x]) grouped[p.x] = [];
                                grouped[p.x].push(p.y);
                            }
                        });

                        scheduleData = Object.entries(grouped).map(([name, times]) => {
                            const sorted = times.sort((a, b) => a - b);
                            return {
                                station: name,
                                arr: Math.ceil(sorted[0]),
                                dep: Math.floor(sorted[1] || sorted[0]),
                                yCoord: stationDistances[name]
                            };
                        });
                    }
                    
                    const offsetLayers = yOffsets.flatMap(offset => {
                        return [
                            new deck.PathLayer({
                                id: `station-layer-${offset}`,
                                data: Object.entries(stationDistances).filter(([name, yValue]) => stationList.has(name)),
                                coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                                getPath: d => [[630, d[1] + offset], [5130, d[1] + offset]],
                                getColor: [80, 80, 80],
                                getWidth: 1,
                                widthMaxPixels: 2,
                                widthMinPixels: 0
                            }),
                            new deck.TextLayer({
                                id: `station-labels-${offset}`,
                                data: currentZoom > 0.8 ? denseLabelData : currentZoom > -0.4 ? normalLabelData : currentZoom > -1.8 ? sparseLabelData : [],
                                coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                                getPosition: d => [d.position[0], d.position[1] + offset],
                                getText: d => d.text,
                                getSize: 12,
                                sizeMaxPixels: 12,
                                sizeMinPixels: 0,
                                getColor: [180, 180, 180],
                                characterSet: 'auto',
                                fontFamily: 'Microsoft YaHei, SimHei, Arial, sans-serif',
                                getAlignmentBaseline: 'bottom', // Position ABOVE the point
                                getTextAnchor: 'middle',        // Center text on the X coordinate
                                pixelOffset: [0, -10]
                            }),

                            new deck.TextLayer({
                                id: `train-schedule-labels-${offset}`,
                                data: scheduleData, // Use the grouped data
                                coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                                getPosition: d => [(d.dep+1.5) * 3, d.yCoord + offset, 0], // Anchor at arrival time
                                getText: d => {
                                    const format = (val) => {
                                        const hh = Math.floor(val / 60).toString().padStart(2, '0');
                                        const mm = (val % 60).toString().padStart(2, '0');
                                        return `${hh}${mm}`;
                                    };
                                    return `${format(d.arr)} - ${format(d.dep)} ${d.station}`;
                                },
                                getSize: 13,
                                getColor: [255, 255, 255],
                                characterSet: 'auto',
                                getTextAnchor: 'start',
                                getAlignmentBaseline: 'center',
                                pixelOffset: [15, 0], 
                                background: true,
                                getBackgroundColor: [0, 0, 0, 180]
                            })
                        ];
                    });

                    const mainPlotLayers = yOffsets.map(offset => new deck.PathLayer({
                        id: `main-path-layer-${offset}`,
                        data: processedSegments,
                        coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                        pickable: true,
                        autoHighlight: true,
                        highlightColor: [255, 255, 255, 150],
                        getPath: d => d.data.map(p => [p.y * 3, p.adjustedDist + offset]),
                        getColor: d => colorPalette[d.train],
                        getWidth: 1.5,
                        widthMaxPixels: 2
                    }));

                    const selectionLayers = yOffsets.flatMap(offset => {
                        return [
                            new deck.PathLayer({
                                id: `selection-layer-${offset}`,
                                // This array is either empty or contains exactly one item
                                data: selectedLine && enabledTypes.has(selectedLine.train) ? processedSegments.filter(s => s.number === selectedLine.number) : [],
                                coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                                pickable: false,
                                getPath: d => d.data.map(p => [p.y * 3, p.adjustedDist + offset]),
                                getColor: [255, 196, 0], // Yellow highlight
                                getWidth: 4,
                                widthMaxPixels: 4.5,
                                widthMinPixels: 0
                            })
                        ];
                    });

                    const baseLayers = [
                        new deck.PathLayer({
                            id: 'thin-time-lines',
                            data: thinLines,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path,
                            getColor: [50, 50, 50],
                            getWidth: 0.7,
                            widthMaxPixels: 1.6
                        }),
                        new deck.PathLayer({
                            id: 'thick-time-lines',
                            data: thickLines,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path,
                            getColor: [80, 80, 80],
                            getWidth: 1,
                            widthMaxPixels: 2
                        }),
                        new deck.TextLayer({
                            id: 'vertical-labels',
                            data: currentZoom > 0.8 ? denseLabels : currentZoom > -0.4 ? normalLabels : currentZoom > -1.6 ? sparseLabels : currentZoom > -2 ? simpleLabels : [],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => d.position,
                            getText: d => d.text,
                            getSize: 12,
                            sizeMaxPixels: 12,
                            getColor: [180, 180, 180],
                            getAlignmentBaseline: 'top',
                            getTextAnchor: 'start',
                            pixelOffset: [5, 5]
                        }),
                        new deck.ScatterplotLayer({
                            id: 'json-layer',
                            data: rawData.flatMap(g => g.data.map(p => ({ ...p, train: g.train }))),
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => [d.y * 3, stationDistances[d.x]],
                            getFillColor: [200, 200, 200],
                            getRadius: 0.0001,
                            radiusMaxPixels: 0.001
                        })
                    ];

                    const currentTimeLayers = [
                        new deck.PathLayer({
                            id: 'current-time-line',
                            data: [{ path: [[currentTimeMinutes * 3, minDist - PERIOD], [currentTimeMinutes * 3, maxDist + PERIOD]] }],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path,
                            getColor: [255, 0, 0, 150],
                            getWidth: 2,
                            widthMaxPixels: 3.5
                        })
                    ];

                    deckInstance.setProps({ 
                        layers: [...baseLayers, ...offsetLayers, ...mainPlotLayers, ...selectionLayers, ...currentTimeLayers] 
                    });
                }

                // --- Footer Controls ---
                document.getElementById('btn-clear-selection').onclick = () => {
                    resetSelection();
                    updateInfoBox();
                    renderLayers();
                };

                document.addEventListener('keydown', (e) => {
                    const key = e.key.toLowerCase();
                    if (key === 'h' && selectedLine) {
                        showSchedule = !showSchedule;
                        renderLayers();
                    }
                    if (key === 'm') {
                        monitor.style.display = (monitor.style.display === 'block') ? 'none' : 'block';
                    }
                });

                // --- Initial Startup ---
                updateStationGridData();
                syncPillStyles();
                renderLayers();
            }

            // Start Application
            initMap();
        </script>
    </body>
</html>
