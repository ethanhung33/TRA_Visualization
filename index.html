const colorPalette = {
    "普悠瑪": "red", "太魯閣": "orange", "新自強": "purple", 
    "自強": "green", "莒光": "gold", "區間快": "blue", "區間": "black"
};

// --- Core Logic ---

async function loadTrainData() {
    try {
        // Fetch from your data folder relative to index.html
        const response = await fetch('data/20260114.txt');
        if (!response.ok) throw new Error('File not found');
        const text = await response.text();
        
        const datasets = parsePythonTxt(text);
        renderChart(datasets);
        document.getElementById('status').innerText = "Last updated: " + new Date().toLocaleTimeString();
    } catch (err) {
        document.getElementById('status').innerHTML = `<b style="color:red">Error: ${err.message}</b>`;
    }
}

function parsePythonTxt(text) {
    const lines = text.trim().split('\n');
    return lines.map(line => {
        const [type, num, stationStr, timeStr] = line.split('|');
        
        // Convert Python-style list "['A', 'B']" to JS Array
        const stations = stationStr.replace(/[\[\]']/g, '').split(', ');
        
        // Convert Python-style tuples "[(a, b), (c, d)]" to JS Array of pairs
        const timePairs = timeStr.match(/\d+,\s*\d+/g).map(pair => pair.split(',').map(Number));

        const dataPoints = [];
        stations.forEach((name, i) => {
            const dist = stationDistances[name];
            if (dist !== undefined) {
                // To show the stop duration, we push two points for the same station
                // (Arrival Time, Distance) and (Departure Time, Distance)
                dataPoints.push({ x: timePairs[i][0], y: dist });
                dataPoints.push({ x: timePairs[i][1], y: dist });
            }
        });

        return {
            label: `${type} ${num}`,
            data: dataPoints,
            borderColor: colorPalette[type] || "#ccc",
            borderWidth: 1.2,
            showLine: true,
            fill: false,
            pointRadius: 0,
            hoverRadius: 5,
            tension: 0 // Straight lines only
        };
    }).filter(ds => ds.data.length > 0);
}

function renderChart(datasets) {
    const ctx = document.getElementById('trainChart').getContext('2d');
    new Chart(ctx, {
        type: 'scatter',
        data: { datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'linear',
                    min: 0, max: 1440, // 00:00 to 24:00
                    ticks: {
                        stepSize: 60,
                        callback: (v) => `${Math.floor(v/60).toString().padStart(2, '0')}:00`
                    },
                    grid: { color: '#eee' }
                },
                y: {
                    reverse: true, // Matches ax.invert_yaxis()
                    ticks: {
                        callback: (v) => Object.keys(stationDistances).find(k => stationDistances[k] === v) || ""
                    },
                    grid: { color: (c) => c.tick.value % 10 === 0 ? '#ddd' : '#f9f9f9' }
                }
            },
            plugins: {
                legend: { display: false }, // Hide legend if too many trains
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            const h = Math.floor(ctx.parsed.x / 60);
                            const m = (ctx.parsed.x % 60).toString().padStart(2, '0');
                            return `${ctx.dataset.label} at ${h}:${m}`;
                        }
                    }
                }
            }
        }
    });
}

// Initial Load
