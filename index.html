<!DOCTYPE html>
<html>
  <head>
    <title>Deck.gl Plain Background</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>

    <style>
      body { margin: 0; padding: 0; }
      #container { width: 100vw; height: 100vh; background-color: #111111; }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script type="text/javascript">
    
      async function initMap() {
        const response = await fetch('data/test_data.json'); 
        const rawData = await response.json();

        // 2. Flatten the nested data so deck.gl can iterate over every point
        const flattenedData = rawData.flatMap(group => 
          group.data.map(point => ({
            ...point,
            parentType: group.type,
            parentNumber: group.number
          }))
        );

        new deck.DeckGL({
          container: 'container',
          initialViewState: {
            longitude: 0, // Adjust these based on your X/Y scale
            latitude: 0,
            zoom: 2,
            pitch: 0
          },
          controller: true,
          layers: [
            new deck.ScatterplotLayer({
              id: 'json-layer',
              data: flattenedData,
              pickable: true,
              opacity: 0.8,
              // Use the x and y from your nested objects
              getPosition: d => [d.x, d.y], 
              // Example: color based on the "type" string in your JSON
              getFillColor: d => d.parentType === 'A' ? [255, 0, 100] : [0, 200, 255],
              getRadius: d => 100,
              radiusMinPixels: 3,
              radiusMaxPixels: 15
            })
          ],
          // Add a basic tooltip to see your "number" and "type" fields
          getTooltip: ({object}) => object && `Type: ${object.parentType}\nID: ${object.parentNumber}`
        });
      }

      initMap();

    </script>
  </body>
</html>
