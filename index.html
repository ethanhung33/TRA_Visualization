<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台鐵運行圖渲染引擎</title>
    <link rel="icon" href="data:,">
    <style>
        /* 全域重置與暗色主題設定 */
        * { box-sizing: border-box; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #1e1e1e; color: #e0e0e0; overflow: hidden; }

        /* 主佈局：左右分割 */
        #app { display: flex; height: 100vh; width: 100vw; }

        /* 左側：畫布 + 底部資訊 */
        #left-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 畫布容器：允許內部捲動，背景全黑 */
        #canvas-wrapper { flex: 1; overflow: auto; background-color: #000000; position: relative; }
        canvas { display: block; }

        /* 底部資訊列 */
        #bottom-bar { 
            height: 60px; 
            background-color: #2d2d2d; 
            border-top: 1px solid #444; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            gap: 15px; 
        }
        #bottom-bar h2 { margin: 0; font-size: 20px; color: #ffffff; }
        #bottom-bar span { font-size: 14px; color: #888888; font-style: italic; }

        /* 右側：側邊控制欄 */
        #sidebar { 
            width: 320px; 
            background-color: #333333; 
            border-left: 1px solid #444; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            overflow-y: auto;
        }

        /* 側邊欄區塊標題 */
        .control-section h3 { margin: 0 0 15px 0; font-size: 18px; color: #ffffff; border-bottom: 1px solid #555; padding-bottom: 5px; }

        /* 日期選擇器 */
        input[type="date"] {
            width: 100%; padding: 8px; background-color: #222; color: #fff;
            border: 1px solid #555; border-radius: 4px; color-scheme: dark;
        }

        /* 按鈕群組 (膠囊按鈕) */
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .pill-btn {
            background-color: #444; border: 1px solid #555; color: #ccc;
            padding: 6px 16px; border-radius: 20px; cursor: pointer;
            font-size: 14px; transition: all 0.2s;
        }
        .pill-btn:hover { background-color: #555; }
        
        /* 啟動狀態的按鈕 */
        .pill-btn.active.green { background-color: #4caf50; color: white; border-color: #4caf50; }
        .pill-btn.active.blue { background-color: #2196f3; color: white; border-color: #2196f3; }
        
        /* 隱藏/展開側邊欄的按鈕 (模擬你截圖中的小箭頭) */
        #toggle-sidebar {
            position: absolute; right: 320px; top: 10px; z-index: 10;
            background: #444; border: none; color: white; padding: 5px 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="left-panel">
        <div id="canvas-wrapper">
            <canvas id="diaCanvas"></canvas>
            
            <div id="crosshair-x" style="position: absolute; left: 0; height: 1px; background: rgba(255, 165, 0, 0.8); pointer-events: none; display: none; z-index: 50;"></div>
            <div id="crosshair-y" style="position: absolute; top: 0; width: 1px; background: rgba(255, 165, 0, 0.8); pointer-events: none; display: none; z-index: 50;"></div>
            <div id="tooltip" style="position: absolute; background: rgba(0,0,0,0.85); color: #fff; padding: 6px 12px; border-radius: 4px; pointer-events: none; display: none; z-index: 60; font-size: 14px; border: 1px solid #555; white-space: nowrap;"></div>
        </div>
        <div id="bottom-bar">
            <h2>列車資訊</h2>
            <span id="train-info-text">點選列車或車站以顯示資訊</span>
        </div>
    </div>

    <div id="sidebar">
        <button id="sidebar-toggle" class="sidebar-toggle-btn">›</button>
        <div class="btn-group" style="justify-content: flex-end;">
            <button class="pill-btn" id="btn-theme">🌞</button>
            <button class="pill-btn">ℹ️</button>
            <button class="pill-btn">❓</button>
        </div>

        <div class="control-section">
            <h3>日期</h3>
            <input type="date" id="datePicker" value="2026-04-16">
        </div>

        <div class="control-section">
            <h3>路線</h3>
            <div class="btn-group">
                <button class="pill-btn active green" id="btn-mountain">山線</button>
                <button class="pill-btn" id="btn-sea">海線</button>
            </div>
        </div>

        <div class="control-section">
            <h3>車種</h3>
            <div class="btn-group" style="margin-bottom: 10px;">
                <button class="pill-btn" id="btn-all-trains">全選</button>
                <button class="pill-btn" id="btn-no-trains">全部不選</button>
            </div>
            <div class="btn-group" id="train-type-container">
                </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
