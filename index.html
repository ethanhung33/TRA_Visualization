<!DOCTYPE html>
<html>
  <head>
    <title>Deck.gl Plain Background</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>

    <style>
      body { margin: 0; padding: 0; }
      /* 2. Set your plain background color here */
      #container { 
        width: 100vw; 
        height: 100vh; 
        background-color: #111111; 
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script type="text/javascript">
      
      // Sample data: random points around a center
      const DATA = Array.from({length: 500}, () => ({
        position: [-122.4 + (Math.random() - 0.5) * 0.2, 37.8 + (Math.random() - 0.5) * 0.2],
        value: Math.random() * 255
      }));

      new deck.DeckGL({
        container: 'container',
        // 3. Remove mapStyle to disable the base map
        initialViewState: {
          longitude: -122.4,
          latitude: 37.8,
          zoom: 10,
          pitch: 0,
          bearing: 0
        },
        controller: true,
        layers: [
          new deck.ScatterplotLayer({
            id: 'scatter-layer',
            data: DATA,
            pickable: true,
            opacity: 0.8,
            stroked: true,
            filled: true,
            radiusScale: 6,
            radiusMinPixels: 1,
            radiusMaxPixels: 100,
            lineWidthMinPixels: 1,
            getPosition: d => d.position,
            getRadius: d => 100,
            getFillColor: d => [d.value, 140, 255], // Dynamic colors
            getLineColor: [255, 255, 255]
          })
        ]
      });
    </script>
  </body>
</html>
