<!DOCTYPE html>
<html lang="zh-TW">
    <head>
    <meta charset="UTF-8">
        <title>Taiwan Railway Operation Diagram</title>
        <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
        <style>
            body { margin: 0; padding: 0; display: flex; background-color: #111; font-family: sans-serif; }
            #container { width: 75vw; height: 100vh; }
            #sidebar { 
                width: 25vw; height: 100vh; background-color: #222; color: white; 
                padding: 20px; box-sizing: border-box; border-left: 1px solid #444;
            }
            .placeholder { color: #666; font-style: italic; }
            h2 { border-bottom: 1px solid #444; padding-bottom: 10px; }
        </style>
    </head>
    <body>
        <div id="container">
            <div id="view-monitor">
                Zoom: <span id="val-zoom">0</span> | 
                Center: [<span id="val-x">0</span>, <span id="val-y">0</span>]
            </div>
        </div>
        <div id="sidebar">
            <h2>篩選器</h2>
            <div id="pill-container">
                <button id="btn-select-all" class="pill utility">全選</button>
                <button id="btn-deselect-all" class="pill utility">全部不選</button>
                <button class="pill active" data-type="普悠瑪" checked> 普悠瑪</button>
                <button class="pill active" data-type="太魯閣" checked> 太魯閣</button>
                <button class="pill active" data-type="新自強" checked> 新自強</button>
                <button class="pill active" data-type="自強" checked> 自強</button>
                <button class="pill active" data-type="莒光" checked> 莒光</button>
                <button class="pill active" data-type="區間快" checked> 區間快</button>
                <button class="pill active" data-type="區間" checked> 區間</button>
            </div>
            <hr>
            <h2>列車資訊</h2>
            <div id="info-content">
                <p class="placeholder">點選列車以顯示資訊</p>
            </div>
        </div>

        <style>
            #container { position: relative; width: 80vw; height: 100vh; }
            #view-monitor { display: none; position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); color: #00ff00; padding: 8px 12px; border-radius: 4px; font-family: monospace; font-size: 12px; pointer-events: none; z-index: 10; border: 1px solid #444; }
            #view-monitor span { color: white; }
            #filter label { display: block; padding: 5px 0; cursor: pointer; color: #ccc; }
            #filter input { margin-right: 10px; }
            hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
            #pill-container { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 0; }
            .pill { border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; background-color: #333; color: #888; border: 1px solid #444; }
            .pill.active { color: black; border-color: transparent; }
            .pill:hover { transform: translateY(-1px); filter: brightness(1.2); }
            .pill.utility:hover, .pill.utility:active { background-color: #666; color: white; border-color: transparent; }
            .info-pill { margin-top: 12px; display: inline-block; background-color: #444; color: #eee; padding: 6px 14px; border-radius: 15px; font-size: 12px; cursor: pointer; border: 1px solid #555; transition: all 0.2s; }
            .info-pill.active { background-color: #ffc400; color: black; border-color: transparent; }
        </style>

        <script type="text/javascript">
            let selectedLine = null;
            let showSchedule = false;
            let currentZoom = 0;
            let enabledTypes = new Set(['普悠瑪', '太魯閣', '新自強', '自強', '莒光', '區間快', '區間']);
            const colorPalette = {"普悠瑪": [255, 82, 82], "太魯閣": [255, 152, 0], "新自強": [156, 77, 204], "自強": [102, 187, 106], "莒光": [253, 216, 53], "區間快": [66, 125, 245], "區間": [158, 158, 158]};
            const stationDistances = {"基隆": 0, "三坑": 15, "八堵": 39, "七堵": 62, "百福": 89, "五堵": 119, "汐止": 133, "汐科": 146, "南港": 193, "松山": 221, "臺北": 285, "萬華": 313, "板橋": 357, "浮洲": 381, "樹林": 411, "南樹林": 431, "山佳": 450, "鶯歌": 494, "鳳鳴": 544, "桃園": 576, "內壢": 635, "中壢": 675, "埔心": 733, "楊梅": 773, "富岡": 841, "新富": 858, "北湖": 873, "湖口": 898, "新豐": 960, "竹北": 1008, "北新竹": 1052, "千甲": 1030, "新莊": 1000, "竹中": 987, "六家": 956, "上員": 960, "榮華": 916, "竹東": 900, "橫山": 865, "九讚頭": 845, "合興": 823, "富貴": 809, "內灣": 787, "新竹": 1066, "三姓橋": 1114, "香山": 1146, "崎頂": 1208, "竹南": 1253, "談文": 1298, "大山": 1366, "後龍": 1403, "龍港": 1439, "白沙屯": 1520, "新埔": 1551, "通霄": 1609, "苑裡": 1670, "日南": 1747, "大甲": 1794, "臺中港": 1846, "清水": 1906, "沙鹿": 1938, "龍井": 1984, "大肚": 2034, "追分": 2084, "造橋": 1307, "豐富": 1366, "苗栗": 1406, "南勢": 1472, "銅鑼": 1514, "三義": 1588, "泰安": 1697, "后里": 1723, "豐原": 1790, "栗林": 1816, "潭子": 1841, "頭家厝": 1860, "松竹": 1877, "太原": 1895, "精武": 1912, "臺中": 1931, "五權": 1953, "大慶": 1974, "烏日": 2005, "新烏日": 2014, "成功": 2038, "彰化": 2109, "花壇": 2175, "大村": 2221, "員林": 2256, "永靖": 2291, "社頭": 2328, "田中": 2371, "二水": 2429, "源泉": 2459, "濁水": 2537, "龍泉": 2586, "集集": 2629, "水里": 2703, "車埕": 2725, "林內": 2510, "石榴": 2558, "斗六": 2606, "斗南": 2682, "石龜": 2721, "大林": 2767, "民雄": 2825, "嘉北": 2892, "嘉義": 2918, "水上": 2984, "南靖": 3010, "後壁": 3070, "新營": 3147, "柳營": 3180, "林鳳營": 3219, "隆田": 3274, "拔林": 3296, "善化": 3342, "南科": 3371, "新市": 3418, "永康": 3468, "大橋": 3505, "臺南": 3532, "保安": 3608, "仁德": 3622, "中洲": 3647, "長榮大學": 3673, "沙崙": 3704, "大湖": 3676, "路竹": 3706, "岡山": 3784, "橋頭": 3820, "楠梓": 3862, "新左營": 3913, "左營": 3933, "內惟": 3944, "美術館": 3961, "鼓山": 3973, "三塊厝": 3990, "高雄": 3999, "民族": 4012, "科工館": 4023, "正義": 4041, "鳳山": 4054, "後庄": 4093, "九曲堂": 4135, "六塊厝": 4185, "屏東": 4208, "歸來": 4234, "麟洛": 4257, "西勢": 4281, "竹田": 4318, "潮州": 4358, "崁頂": 4407, "南州": 4431, "鎮安": 4469, "林邊": 4500, "佳冬": 4539, "東海": 4570, "枋寮": 4611, "加祿": 4664, "內獅": 4699, "枋山": 4747, "大武": 5049, "瀧溪": 5166, "金崙": 5250, "太麻里": 5359, "知本": 5476, "康樂": 5547, "臺東": 5592, "山里": 5674, "鹿野": 5735, "瑞源": 5790, "瑞和": 5817, "關山": 5892, "海端": 5957, "池上": 6014, "富里": 6082, "東竹": 6143, "東里": 6203, "玉里": 6271, "三民": 6379, "瑞穗": 6473, "富源": 6564, "大富": 6596, "光復": 6671, "萬榮": 6727, "鳳林": 6776, "南平": 6818, "林榮新光": 6840, "豐田": 6902, "壽豐": 6930, "平和": 6948, "志學": 6978, "吉安": 7066, "花蓮": 7101, "北埔": 7147, "景美": 7212, "新城": 7265, "崇德": 7318, "和仁": 7418, "和平": 7497, "漢本": 7541, "武塔": 7670, "南澳": 7707, "東澳": 7787, "永樂": 7844, "蘇澳": 7863, "蘇澳新": 7896, "冬山": 7947, "羅東": 7997, "中里": 8015, "二結": 8027, "宜蘭": 8085, "四城": 8122, "礁溪": 8169, "頂埔": 8210, "頭城": 8232, "外澳": 8269, "龜山": 8304, "大溪": 8350, "大里": 8397, "石城": 8424, "福隆": 8478, "貢寮": 8516, "雙溪": 8569, "牡丹": 8603, "三貂嶺": 8638, "大華": 8602, "十分": 8574, "望古": 8557, "嶺腳": 8536, "平溪": 8526, "菁桐": 8509, "猴硐": 8663, "瑞芳": 8709, "海科館": 8752, "八斗子": 8756, "四腳亭": 8759, "暖暖": 8782};
            let stationList = new Set(['基隆', '三坑', '八堵', '七堵', '百福', '五堵', '汐止', '汐科', '南港', '松山', '臺北', '萬華', '板橋', '浮洲', '樹林', '南樹林', '山佳', '鶯歌', '鳳鳴', '桃園', '內壢', '中壢', '埔心', '楊梅', '富岡', '新富', '北湖', '湖口', '新豐', '竹北', '北新竹', '新竹', '三姓橋', '香山', '崎頂', '竹南', '造橋', '豐富', '苗栗', '南勢', '銅鑼', '三義', '泰安', '后里', '豐原', '栗林', '潭子', '頭家厝', '松竹', '太原', '精武', '臺中', '五權', '大慶', '烏日', '新烏日', '成功', '彰化', '花壇', '大村', '員林', '永靖', '社頭', '田中', '二水', '林內', '石榴', '斗六', '斗南', '石龜', '大林', '民雄', '嘉北', '嘉義', '水上', '南靖', '後壁', '新營', '柳營', '林鳳營', '隆田', '拔林', '善化', '南科', '新市', '永康', '大橋', '臺南', '保安', '仁德', '中洲', '大湖', '路竹', '岡山', '橋頭', '楠梓', '新左營', '左營', '內惟', '美術館', '鼓山', '三塊厝', '高雄', '民族', '科工館', '正義', '鳳山', '後庄', '九曲堂', '六塊厝', '屏東', '歸來', '麟洛', '西勢', '竹田', '潮州', '崁頂', '南州', '鎮安', '林邊', '佳冬', '東海', '枋寮', '加祿', '內獅', '枋山', '大武', '瀧溪', '金崙', '太麻里', '知本', '康樂', '臺東', '山里', '鹿野', '瑞源', '瑞和', '關山', '海端', '池上', '富里', '東竹', '東里', '玉里', '三民', '瑞穗', '富源', '大富', '光復', '萬榮', '鳳林', '南平', '林榮新光', '豐田', '壽豐', '平和', '志學', '吉安', '花蓮', '北埔', '景美', '新城', '崇德', '和仁', '和平', '漢本', '武塔', '南澳', '東澳', '永樂', '蘇澳新', '冬山', '羅東', '中里', '二結', '宜蘭', '四城', '礁溪', '頂埔', '頭城', '外澳', '龜山', '大溪', '大里', '石城', '福隆', '貢寮', '雙溪', '牡丹', '三貂嶺', '猴硐', '瑞芳', '四腳亭', '暖暖']);
            const distances = Array.from(stationList).map(name => stationDistances[name]);

            async function initMap() {
                const response = await fetch('data/20260218.json'); 
                const rawData = await response.json();
                const infoBox = document.getElementById('info-content');
                const valZoom = document.getElementById('val-zoom');
                const valX = document.getElementById('val-x');
                const valY = document.getElementById('val-y');

                document.querySelectorAll('.type-filter').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const type = e.target.value;
                        if (e.target.checked) enabledTypes.add(type);
                        else enabledTypes.delete(type);

                        // If we hide the currently selected line, clear the info box
                        if (selectedLine && selectedLine.type === type && !e.target.checked) {
                            selectedLine = null;
                            infoBox.innerHTML = `<p class="placeholder">點選列車以顯示資訊</p>`;
                        }
                        
                        renderLayers();
                    });
                });

                const pillContainer = document.getElementById('pill-container');
                const allTypes = Object.keys(colorPalette);
                const pills = document.querySelectorAll('.pill');

                // 1. Create a single function to handle the UI looks
                function syncPillStyles() {
                    const trainPills = document.querySelectorAll('.pill[data-type]');
                    trainPills.forEach(pill => {
                        const type = pill.getAttribute('data-type');
                        const color = colorPalette[type];
                        
                        if (enabledTypes.has(type)) {
                            pill.classList.add('active');
                            pill.style.backgroundColor = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                            pill.style.color = 'black';
                        } else {
                            pill.classList.remove('active');
                            pill.style.backgroundColor = '#333';
                            pill.style.color = '#888';
                        }
                    });
                }

                // 2. Individual Pill Clicks
                pills.forEach(pill => {
                    pill.addEventListener('click', () => {
                        const type = pill.getAttribute('data-type');
                        
                        // Toggle the data
                        if (enabledTypes.has(type)) {
                            enabledTypes.delete(type);
                            // Clear info box if the hidden train was selected
                            if (selectedLine && selectedLine.train === type) {
                                selectedLine = null;
                                document.getElementById('info-content').innerHTML = `<p class="placeholder">點選列車以顯示資訊</p>`;
                            }
                        } else {
                            enabledTypes.add(type);
                        }

                        syncPillStyles(); // Update the buttons
                        renderLayers();   // Update the map
                    });
                });

                // 3. Select All
                document.getElementById('btn-select-all').addEventListener('click', () => {
                    allTypes.forEach(type => enabledTypes.add(type));
                    syncPillStyles();
                    renderLayers();
                });

                // 4. Deselect All
                document.getElementById('btn-deselect-all').addEventListener('click', () => {
                    enabledTypes.clear();
                    selectedLine = null;
                    document.getElementById('info-content').innerHTML = `<p class="placeholder">點選列車以顯示資訊</p>`;
                    syncPillStyles();
                    renderLayers();
                });

                // 5. Run once on startup to set initial colors
                syncPillStyles();
                
                function updateInfoBox() {
                    if (!selectedLine) return;
                    
                    const formattedNote = (selectedLine.info.note || "").replace(/。/g, '。<br>');
                    const viaText = selectedLine.info.via !== '-' ? `<br>經由${selectedLine.info.via}。` : '';
                    const btnLabel = showSchedule ? "隱藏停靠站" : "顯示停靠站";
                    const btnClass = showSchedule ? "info-pill active" : "info-pill";

                    infoBox.innerHTML = `
                        <p><strong>${selectedLine.train} ${selectedLine.number}</strong>
                        <button id="btn-toggle-schedule" class="${btnClass}">${btnLabel}</button></p>
                        <p>${selectedLine.info.start} → ${selectedLine.info.end}${viaText}</p>
                        <p>${formattedNote}</p>
                    `;

                    document.getElementById('btn-toggle-schedule').onclick = () => {
                        showSchedule = !showSchedule;
                        updateInfoBox(); // Refresh button text/class
                        renderLayers();  // Show/Hide the labels on map
                    };
                }

                const deckInstance = new deck.DeckGL({
                    container: 'container',
                    views: [new deck.OrthographicView({id: 'ortho'})],
                    initialViewState: { target: [0, 0, 0], zoom: -1 },
                    controller: true,
                    pickingRadius: 10,
                    
                    onViewStateChange: ({viewState}) => { 
                        currentZoom = viewState.zoom;
                        const monitor = document.getElementById('view-monitor');
                        if (monitor.style.display === 'block') {
                            valZoom.innerText = viewState.zoom.toFixed(2);
                            valX.innerText = Math.round(viewState.target[0]);
                            valY.innerText = Math.round(viewState.target[1]);
                        }
                        deckInstance.setProps({viewState}); 
                        renderLayers(); // Re-render for dynamic font sizes
                    },

                    onClick: (info) => {
                        if (info.object && info.layer.id === 'main-path-layer') {
                            selectedLine = info.object;
                            showSchedule = true; 
                            updateInfoBox();
                        } else {
                            // Reset if clicking background
                            selectedLine = null;
                            showSchedule = false;
                            infoBox.innerHTML = `<p class="placeholder">點選列車以顯示資訊</p>`;
                        }
                        renderLayers();
                    }
                });

                const denseLabelData = [];
                const normalLabelData = [];
                const sparseLabelData = [];
                Object.entries(stationDistances).forEach(([name, yValue]) => {
                    if (stationList.has(name)) {
                        for (let x = 720; x <= 5040; x += 360) {
                            denseLabelData.push({
                                text: name,
                                position: [x, yValue],
                                y: yValue
                            });
                        }
                        for (let x = 720; x <= 5040; x += 720) {
                            normalLabelData.push({
                                text: name,
                                position: [x, yValue],
                                y: yValue
                            });
                        }
                        for (let x = 720; x <= 5040; x += 1440) {
                            sparseLabelData.push({
                                text: name,
                                position: [x, yValue],
                                y: yValue
                            });
                        }
                    }
                });

                const minDistance = Math.min(...distances);
                const maxDistance = Math.max(...distances);
                const thickLines = [];
                const thinLines = [];
                const sparseLabels = [];
                const normalLabels = [];
                const denseLabels = [];
                for (let x = 720; x <= 5040; x += 30) {
                    if (x % 180 === 0) {
                        thickLines.push({ path: [[x, minDistance], [x, maxDistance]] });
                    } else {
                        thinLines.push({ path: [[x, minDistance], [x, maxDistance]] });
                    }
                }
                for (let y = minDistance; y <= maxDistance; y += 250) {
                    for (let x = 720; x <= 5040; x += 30) {
                        denseLabels.push({ text: `${(Math.floor(x/180)).toString().padStart(2, '0')}${(x%180/3).toString().padStart(2, '0')}`, position: [x+5, y] });
                    }
                    for (let x = 720; x <= 5040; x += 90) {
                        normalLabels.push({ text: `${(Math.floor(x/180)).toString().padStart(2, '0')}${(x%180/3).toString().padStart(2, '0')}`, position: [x+5, y] });
                    }
                    for (let x = 720; x <= 5040; x += 180) {
                        sparseLabels.push({ text: `${(Math.floor(x/180)).toString().padStart(2, '0')}${(x%180/3).toString().padStart(2, '0')}`, position: [x+5, y] });
                    }
                }

                function renderLayers() {
                    const filteredData = rawData.filter(d => enabledTypes.has(d.train));
                    const TIME_THRESHOLD = 5000;
                    const processedSegments = [];
                    rawData.filter(d => enabledTypes.has(d.train)).forEach(train => {
                        let currentSegment = [];
                        const points = train.data;

                        for (let i = 0; i < points.length; i++) {
                            const currentPoint = points[i];
                            const prevPoint = points[i - 1];

                            // Check constraint: Is the gap between this station and the last one too big?
                            if (prevPoint) {
                                const timeGap = Math.abs(stationDistances[currentPoint.x] - stationDistances[prevPoint.x]);
                                
                                if (timeGap > TIME_THRESHOLD) {
                                    // Gap detected! Save the completed segment and start a new one
                                    if (currentSegment.length > 1) {
                                        processedSegments.push({ ...train, data: currentSegment });
                                    }
                                    currentSegment = []; 
                                }
                            }
                            if (stationList.has(currentPoint.x)) {
                                currentSegment.push(currentPoint);
                            }
                        }

                        // Push the final segment for this train
                        if (currentSegment.length > 1) {
                            processedSegments.push({ ...train, data: currentSegment });
                        }
                    });

                    let scheduleData = [];
                    if (showSchedule && selectedLine) {
                        const grouped = {};
                        selectedLine.data.forEach(p => {
                            if (!grouped[p.x]) grouped[p.x] = [];
                            grouped[p.x].push(p.y);
                        });

                        scheduleData = Object.entries(grouped).map(([name, times]) => {
                            // Sort times to ensure [arrival, departure] order
                            const sortedTimes = times.sort((a, b) => a - b);
                            return {
                                station: name,
                                arr: Math.ceil(sortedTimes[0]),
                                dep: Math.floor(sortedTimes[1]),
                                yCoord: stationDistances[name]
                            };
                        });
                    }
                    
                    const layers = [
                        new deck.PathLayer({
                            id: 'station-layer',
                            data: Object.entries(stationDistances).filter(([name, yValue]) => stationList.has(name)),
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => [[630, d[1]], [5130, d[1]]],
                            getColor: [80, 80, 80],
                            getWidth: 1,
                            widthMaxPixels: 2,
                            widthMinPixels: 0
                        }),
                        new deck.TextLayer({
                            id: 'station-labels',
                            data: currentZoom > 0.8 ? denseLabelData : currentZoom > -0.4 ? normalLabelData : currentZoom > -1.8 ? sparseLabelData : [],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => d.position,
                            getText: d => d.text,
                            getSize: 12,
                            sizeMaxPixels: 12,
                            sizeMinPixels: 0,
                            getColor: [180, 180, 180],
                            characterSet: 'auto',
                            fontFamily: 'Microsoft YaHei, SimHei, Arial, sans-serif',
                            getAlignmentBaseline: 'bottom', // Position ABOVE the point
                            getTextAnchor: 'middle',        // Center text on the X coordinate
                            pixelOffset: [0, -10]
                        }),

                        new deck.PathLayer({
                            id: 'thin-time-lines',
                            data: thinLines,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path,
                            getColor: [50, 50, 50], // Very faint
                            getWidth: 0.7,
                            widthMaxPixels: 1.6,
                            widthMinPixels: 0
                        }),
                        new deck.PathLayer({
                            id: 'thick-time-lines',
                            data: thickLines,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPath: d => d.path,
                            getColor: [80, 80, 80], // Brighter
                            getWidth: 1,
                            widthMaxPixels: 2,
                            widthMinPixels: 0
                        }),
                        new deck.TextLayer({
                            id: 'vertical-labels',
                            data: currentZoom > 0.8 ? denseLabels : currentZoom > -0.4 ? normalLabels : currentZoom > -1.8 ? sparseLabels : [],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => d.position,
                            getText: d => d.text,
                            getSize: 12,
                            sizeMaxPixels: 12,
                            sizeMinPixels: 0,
                            getColor: [180, 180, 180],
                            characterSet: 'auto',
                            getAlignmentBaseline: 'top', // Position BELOW the point
                            getTextAnchor: 'start',
                            pixelOffset: [5, 5]
                        }),

                        new deck.PathLayer({
                            id: 'main-path-layer',
                            data: processedSegments,
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            pickable: true,
                            autoHighlight: true,
                            highlightColor: [255, 255, 255, 150],
                            getPath: d => d.data.map(p => [p.y*3, stationDistances[p.x]]),
                            getColor: d => colorPalette[d.train],
                            getWidth: 1.5,
                            widthMaxPixels: 2,
                            widthMinPixels: 0
                        }),
                        new deck.PathLayer({
                            id: 'selection-layer',
                            // This array is either empty or contains exactly one item
                            data: selectedLine && enabledTypes.has(selectedLine.train) ? [selectedLine] : [],
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            pickable: false,
                            getPath: d => d.data.map(p => [p.y*3, stationDistances[p.x]]),
                            getColor: [255, 196, 0], // Yellow highlight
                            getWidth: 3,
                            widthMaxPixels: 3.5,
                            widthMinPixels: 0
                        }),
                        new deck.TextLayer({
                            id: 'train-schedule-labels',
                            data: scheduleData, // Use the grouped data
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => [d.dep * 3, d.yCoord], // Anchor at arrival time
                            getText: d => {
                                const format = (val) => {
                                    const hh = Math.floor(val / 60).toString().padStart(2, '0');
                                    const mm = (val % 60).toString().padStart(2, '0');
                                    return `${hh}${mm}`;
                                };
                                return `<p style="color:Gray">${format(d.arr)} - </p>${format(d.dep)} ${d.station}`;
                            },
                            getSize: 13,
                            getColor: [255, 255, 255],
                            characterSet: 'auto',
                            getTextAnchor: 'start',
                            getAlignmentBaseline: 'center',
                            pixelOffset: [15, 0], 
                            background: true,
                            getBackgroundColor: [0, 0, 0, 180]
                        }),
                        
                        new deck.ScatterplotLayer({
                            id: 'json-layer',
                            data: rawData.flatMap(g => g.data.map(p => ({...p, train: g.train}))),
                            coordinateSystem: deck.COORDINATE_SYSTEM.CARTESIAN,
                            getPosition: d => [d.y*3, stationDistances[d.x]], 
                            getFillColor: [200, 200, 200],
                            getRadius: 0.0001,
                            radiusMaxPixels: 0.001,
                            radiusMinPixels: 0.00001
                        })
                    ];

                    deckInstance.setProps({layers});
                }

                document.addEventListener('keydown', (e) => {
                    if (e.key.toLowerCase() === 'm') {
                        const monitor = document.getElementById('view-monitor');
                        if (monitor.style.display === 'block') {
                            monitor.style.display = 'none';
                        } else {
                            monitor.style.display = 'block';
                        }
                    }
                });

                renderLayers();
            }
            
            initMap();
        </script>
    </body>
</html>
